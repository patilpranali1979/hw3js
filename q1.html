<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id ="ul">
        <li>html</li>
        <li>css</li>
        <li>js</li>
    </ul>
    <script>
        const ul = document.getElementById("ul")
        const li = document.createElement("li")
        li.textContent="js"
        ul.append(li)
    </script>
</body>
</html>
